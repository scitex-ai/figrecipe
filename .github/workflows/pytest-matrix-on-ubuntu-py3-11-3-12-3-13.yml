name: tests

# Self-hosted (Spartan CPU) pytest matrix.
#
# SIF-based self-hosted CI (operator standardization 2026-06-18). The `tests`
# job runs INSIDE the pre-built, reused scitex-ci SIF (`apptainer exec
# ci-cpu.sif`) on the Spartan CPU runner, instead of the old bare-runner
# `actions/setup-python@v5 + pip install` steps. Those steps required a
# Python tool cache + apt (for fd) that a bare Spartan compute node does NOT
# have, so the job failed at init (steps=0) and every run sat queued forever
# behind an OFFLINE, wrong-labelled runner.
#
# The shared ci-cpu.sif bakes python 3.11/3.12/3.13 + uv + fd +
# scitex-dev[all,dev] DEPS (NOT figrecipe's own — matplotlib/seaborn/django/
# Pillow/networkx/etc.), so the job layers THIS checkout + its [all,dev]
# extras WITH dependency resolution into a writable --target dir inside the
# SIF (see .github/ci/run-in-sif.sh). fd is baked, so `audit.require-fd: true`
# (.scitex/dev/config.yaml) passes without the old apt-get fd-find step.
# fail-loud: a missing SIF/shim is a HARD error, never a bare-runner fallback.
#
# runs-on driven by repo Actions Variable CI_RUNS_ON (the scitex-ci runner
# pool on the shared Spartan lease); SIF + apptainer paths come from
# SCITEX_CI_SIF / SCITEX_CI_APPTAINER. Hosted workflows (import-smoke,
# quality-audit, rtd, publish) stay on ubuntu-latest — untouched.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 7 * * *"  # nightly 07:00 UTC
  workflow_dispatch:

env:
  SCITEX_CI_APPTAINER: ${{ vars.SCITEX_CI_APPTAINER }}
  SCITEX_CI_SIF: ${{ vars.SCITEX_CI_SIF }}

jobs:
  test:
    # Job name kept verbatim — these are the required status checks on develop.
    name: pytest-matrix-on-ubuntu-py${{ matrix.python-version }}
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '["self-hosted","Linux","X64","scitex-ci"]') }}
    # figrecipe's ~2460-test suite runs ~25-30 min even under xdist on the
    # Spartan CPU node (coverage with concurrency=multiprocessing,thread limits
    # the xdist speedup). 60 min leaves comfortable headroom on a busy node so
    # the suite is never cancelled mid-run (the old 30-min cap killed it at 96%).
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Run tests in the reused CI SIF (apptainer exec — deps layered, not on the bare runner)
        run: bash .github/ci/exec-in-sif.sh run-in-sif.sh ${{ matrix.python-version }}
      - name: Upload coverage to Codecov
        if: always() && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false
