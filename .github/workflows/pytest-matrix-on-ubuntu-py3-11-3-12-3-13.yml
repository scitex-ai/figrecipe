name: tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 7 * * *"  # nightly 07:00 UTC
  workflow_dispatch:

jobs:
  test:
    name: pytest-matrix-on-ubuntu-py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          # Built-in pip cache keyed on (pyproject.toml, py-version).
          # Cuts the dependency-install step from ~60-90s to <10s on
          # cache hit (pip skips wheel downloads + reuses the resolver
          # output). Cold-cache runs (first push after a pyproject
          # bump) pay full cost; warm runs short-circuit. Safe: the
          # cache key encodes the lockfile-equivalent (pyproject.toml),
          # so any dep change invalidates the cache — no stale-deps
          # risk.
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Fallback chain: prefer [all,dev] so optional-dep code paths
          # (yaml, fastmcp, textual) get exercised. Falls back to [dev] then
          # plain editable so a packaging hiccup doesn't strand CI.
          pip install -e ".[all,dev]" || pip install -e ".[dev]" || pip install -e .
      - name: Install fd (Rust file finder; preferred fast path for audit discovery)
        run: |
          # tests/develop/test_audit.py runs scitex-dev's audit-project, whose
          # orphan-hinter prefers fd/fdfind for file discovery. This repo sets
          # audit.require-fd: true (.scitex/dev/config.yaml), so fd-absence
          # ERRORS rather than falling back — install it here. Debian/Ubuntu
          # ships the binary as `fdfind`; symlink to `fd` so the `fd` lookup
          # resolves too.
          sudo apt-get update && sudo apt-get install -y fd-find
          sudo ln -sf "$(command -v fdfind)" /usr/local/bin/fd
          fd --version
      - name: Run tests
        run: |
          pytest tests/ --cov=src/figrecipe --cov-report=xml --cov-report=term
      - name: Upload coverage to Codecov
        if: always() && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false
