name: quality

# Single-package quality gate — runs `scitex-dev ecosystem audit-all`
# against this package (audit-cli / audit-mcp-tools / audit-skills /
# audit-python-apis / audit-project). Mirrors the canonical audit that
# `tests/develop/test_audit.py` runs inside the test suite, but as a
# standalone gate so an audit regression is visible even when the matrix
# is skipped.
#
# The previous body of this workflow shallow-cloned the entire ecosystem
# and ran `scripts/quality/audit_ecosystem.py` — both of which live only
# in scitex-dev, not in leaf packages. That template was copied here
# verbatim and was always broken (FileNotFoundError on a non-existent
# ecosystem registry file). This version audits just this package.

on:
  schedule:
    - cron: "0 8 * * *"  # 08:00 UTC, after the 07:00 per-repo Test runs
  workflow_dispatch:
  push:
    branches: [develop]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/figrecipe-quality-audit-on-ubuntu-latest.yml"
  pull_request:
    branches: [main, develop]

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          # --new-only stages `develop` via `git worktree add --detach`;
          # the full history + a local `develop` ref are needed for that
          # to work. fetch-depth=0 pulls the full history; the explicit
          # fetch step below materialises a local `develop` branch from
          # origin/develop so worktree-add can resolve the ref.
          fetch-depth: 0

      - name: Ensure local develop ref exists (for --new-only diff)
        run: |
          git fetch origin develop:develop || \
            git fetch origin develop && git branch -f develop origin/develop

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # Pin scitex-dev to a ref that includes the line-stable ViolationKey
          # fix (commit 96384b43, follow-up to PR #138's `audit-all --new-only`).
          # PyPI's latest tag (v0.17.13) was cut before that fix landed; until
          # the next release, install from develop. Drop this back to a PyPI
          # pin (`scitex-dev[cli-audit]>=0.17.14`) once tagged.
          pip install "scitex-dev[cli-audit] @ git+https://github.com/ywatanabe1989/scitex-dev@develop"

      - name: Install fd (Rust file finder; preferred fast path for audit discovery)
        run: |
          # scitex-dev's audit-project orphan-hinter prefers fd/fdfind for
          # file discovery. Absent fd it warns + falls back to a stdlib walk,
          # but this repo sets audit.require-fd: true (.scitex/dev/config.yaml)
          # so the audit ERRORS if fd is missing — install it here so the fast
          # path always runs. Debian/Ubuntu ships the binary as `fdfind`;
          # symlink it to `fd` so scitex-dev's `fd` lookup resolves too.
          sudo apt-get update && sudo apt-get install -y fd-find
          sudo ln -sf "$(command -v fdfind)" /usr/local/bin/fd
          fd --version

      - name: Run scitex-dev ecosystem audit-all (new-only ratchet)
        # `--new-only` compares HEAD's violations to develop's (default `--since`)
        # and only fails on NET-NEW findings. Pre-existing baseline debt
        # (e.g. PA-306 / PA-307 across the test tree) is grandfathered so a
        # PR is judged on what IT changed, not on the repo's accumulated debt.
        # Drop the flag once the baseline has been burned down.
        run: scitex-dev ecosystem audit-all figrecipe --new-only --no-version-check
