name: CLA Assistant

# Org-level reusable-workflow caller (scitex-ai/.github; fleet CI
# unification wave 2). Triggers/permissions preserved verbatim from the
# prior local file; the job bodies live org-side so they cannot drift
# per-repo.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]
  push:
    branches: [main, develop]
    tags: ['v*']

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  call:
    uses: scitex-ai/.github/.github/workflows/cla.yml@main
    secrets: inherit
